name: Publish Rust Crates

on:
  workflow_dispatch:
    inputs:
      crate:
        description: 'Crate name to publish'
        required: true
        type: choice
        options:
          - utm-parse
          - short-link-parse
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    container: rust:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install cargo-release
        run: cargo install cargo-release

      - name: Update version
        run: |
          cd rust/${{ inputs.crate }}
          if [[ "${{ inputs.version }}" == "patch" ]]; then
            cargo release patch --no-publish --no-tag --execute || true
          elif [[ "${{ inputs.version }}" == "minor" ]]; then
            cargo release minor --no-publish --no-tag --execute || true
          elif [[ "${{ inputs.version }}" == "major" ]]; then
            cargo release major --no-publish --no-tag --execute || true
          fi
          cat Cargo.toml | grep '^version'

      - name: Run tests
        run: |
          cd rust/${{ inputs.crate }}
          cargo test

      - name: Check formatting
        run: |
          cd rust/${{ inputs.crate }}
          cargo fmt --check

      - name: Clippy
        run: |
          cd rust/${{ inputs.crate }}
          cargo clippy -- -D warnings

      - name: Publish to crates.io
        run: |
          cd rust/${{ inputs.crate }}
          cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Create Git Tag
        run: |
          cd rust/${{ inputs.crate }}
          VERSION=$(grep '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag ${{ inputs.crate }}-v$VERSION
          git push origin ${{ inputs.crate }}-v$VERSION

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.crate }}-v${{ env.VERSION }}
          release_name: ${{ inputs.crate }} v${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
